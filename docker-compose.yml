services:
  db:
    image: postgres:16
    container_name: turismo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: turismo
    ports:
      - "5433:5432"
    volumes:
      - turismo_pgdata:/var/lib/postgresql/data

volumes:
  turismo_pgdata: